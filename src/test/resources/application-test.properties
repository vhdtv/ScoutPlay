# Configuração para testes com banco H2 em memória
spring.datasource.url=jdbc:h2:mem:scoutplay_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# JWT
app.jwt.secret=chave-de-teste-com-minimo-de-32-caracteres-para-testes-bdd
app.jwt.expirationMs=86400000

# Desabilitar verificação de segurança no contexto de teste
spring.security.user.name=test
spring.security.user.password=test
