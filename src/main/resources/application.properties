spring.application.name=Scout Play Application

# ============== DATASOURCE ==============
spring.datasource.url=jdbc:postgresql://localhost:5432/scoutplaydb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ============== CORS CONFIG ==============
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600

# ============== JWT CONFIG (Será usado na Semana 2) ==============
# NUNCA commitar secrets em properties! Usar variáveis de ambiente em produção
app.jwt.secret=${JWT_SECRET:sua-chave-secreta-muito-segura-aqui-minimo-32-caracteres-para-seguranca}
app.jwt.expirationMs=${JWT_EXPIRATION:86400000}

# ============== FILE UPLOAD CONFIG ==============
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/fotos_perfil/

# ============== JSON SERIALIZATION ==============
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ============== LOGGING ==============
logging.level.com.scoutplay=DEBUG
