spring.application.name=Scout Play Application
spring.profiles.default=dev

# ============== DATASOURCE ==============
# Credenciais definidas por perfil (application-dev.properties / application-prod.properties)
# ou via variáveis de ambiente DB_URL, DB_USERNAME, DB_PASSWORD
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/scoutplaydb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ============== CORS CONFIG ==============
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600

# ============== JWT CONFIG ==============
# Cada perfil define app.jwt.secret individualmente:
#   dev  → application-dev.properties (chave local, arquivo ignorado pelo git)
#   prod → application-prod.properties via variável de ambiente JWT_SECRET (obrigatória)
app.jwt.expirationMs=${JWT_EXPIRATION:86400000}

# ============== FILE UPLOAD CONFIG ==============
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/fotos_perfil/

# ============== JSON SERIALIZATION ==============
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ============== LOGGING ==============
logging.level.com.scoutplay=DEBUG
