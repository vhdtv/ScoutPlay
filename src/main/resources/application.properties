spring.application.name=Scout Play Application
spring.profiles.default=dev

# ============== DATASOURCE ==============
spring.datasource.url=jdbc:postgresql://localhost:5432/scoutplaydb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ============== CORS CONFIG ==============
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600

# ============== JWT CONFIG ==============
# NUNCA commitar secrets em properties! Usar variáveis de ambiente em produção
app.jwt.secret=${JWT_SECRET:3d8f2a1b9c4e7f0d5a6b2c8e1f4a7d3b9c0e5f2a8d1b4c7e0f3a6b9d2c5e8f1a}
app.jwt.expirationMs=${JWT_EXPIRATION:86400000}

# ============== FILE UPLOAD CONFIG ==============
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/fotos_perfil/

# ============== JSON SERIALIZATION ==============
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ============== LOGGING ==============
logging.level.com.scoutplay=DEBUG
