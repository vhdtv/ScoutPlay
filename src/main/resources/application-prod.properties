# ============== PROFILE: PRODUCTION ==============
spring.config.activate.on-profile=prod

# ============== DATASOURCE (Production) ==============
# Use variáveis de ambiente: DB_URL, DB_USERNAME, DB_PASSWORD
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ============== JWT (Production) ==============
# Obrigatório definir JWT_SECRET em variáveis de ambiente!
app.jwt.secret=${JWT_SECRET}
app.jwt.expirationMs=${JWT_EXPIRATION:86400000}

# ============== LOGGING (Production) ==============
logging.level.root=WARN
logging.level.com.scoutplay=INFO
logging.level.org.springframework.web=WARN

# ============== CORS (Production) ==============
# Configurar origens permitidas via variável de ambiente
spring.web.cors.allowed-origins=${CORS_ORIGINS:https://scoutplay.com}
